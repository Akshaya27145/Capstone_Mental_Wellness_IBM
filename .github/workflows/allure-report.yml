name: Playwright + Allure Report to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-publish-allure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: e2e

      - name: Run Playwright tests (Allure results)
        run: npx playwright test
        working-directory: e2e
        continue-on-error: true

      - name: Ensure Allure results directory exists
        if: always()
        run: mkdir -p e2e/allure-results

      - name: Load previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        if: always()
        run: npm i -g allure-commandline --no-progress

      - name: Restore Allure history
        if: always()
        shell: bash
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p e2e/allure-results/history
            cp -r gh-pages/history/. e2e/allure-results/history/
          fi

      - name: Build Allure report
        if: always()
        run: allure generate e2e/allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
