name: Playwright + Allure Report to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-publish-allure:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1234
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            e2e/package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Create server .env for CI
        run: |
          cat > server/.env <<'EOF'
          PORT=4000
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=1234
          DB_NAME=wellness_booking
          JWT_SECRET=change_this_to_a_long_random_secret
          CLIENT_ORIGIN=http://localhost:5173
          EOF

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: e2e

      - name: Prepare Allure results folder
        working-directory: e2e
        if: always()
        run: |
          rm -rf allure-results/*

      - name: Ensure Allure results directory exists
        if: always()
        run: mkdir -p e2e/allure-results

      - name: Run Playwright tests (chromium)
        run: npx playwright test --project=chromium
        working-directory: e2e
        continue-on-error: true

      - name: Debug Allure results (chromium)
        if: always()
        shell: bash
        run: |
          echo "Chromium allure-results listing:"
          ls -lah e2e/allure-results || true
          echo "Chromium json count:"
          ls e2e/allure-results/*.json 2>/dev/null | wc -l || true

      - name: Run Playwright tests (firefox)
        run: npx playwright test --project=firefox
        working-directory: e2e
        continue-on-error: true

      - name: Debug Allure results (firefox)
        if: always()
        shell: bash
        run: |
          echo "Firefox allure-results listing:"
          ls -lah e2e/allure-results || true
          echo "Firefox json count:"
          ls e2e/allure-results/*.json 2>/dev/null | wc -l || true

      - name: Run Playwright tests (webkit)
        run: npx playwright test --project=webkit
        working-directory: e2e
        continue-on-error: true

      - name: Debug Allure results (webkit)
        if: always()
        shell: bash
        run: |
          echo "Webkit allure-results listing:"
          ls -lah e2e/allure-results || true
          echo "Webkit json count:"
          ls e2e/allure-results/*.json 2>/dev/null | wc -l || true

      - name: Load previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        if: always()
        run: npm i -g allure-commandline --no-progress

      - name: Restore Allure history
        if: always()
        shell: bash
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p e2e/allure-results/history
            cp -r gh-pages/history/. e2e/allure-results/history/
          fi

      - name: Build Allure report
        if: always()
        run: allure generate e2e/allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
